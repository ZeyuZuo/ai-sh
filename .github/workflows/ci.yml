name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: sudo apt-get update && sudo apt-get install --yes fish zsh
      - run: uv sync --locked --dev --python ${{ matrix.python-version }}
      - run: uv run --python ${{ matrix.python-version }} pytest tests/

  release-checks:
    name: Release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: uv sync --locked --dev --python 3.14
      - run: uv run --python 3.14 ruff check .
      - run: uv run --python 3.14 mypy
      - run: uv build --python 3.14
      - run: scripts/smoke_wheel.sh dist/tmksh-*.whl
